<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex KPIs Framework — Horeca Star</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --green-900:#15301F; --green-700:#1F4D38; --green-600:#286B4D;
  --green-400:#4E9472; --green-200:#BFE0CC; --green-50:#EAF3ED;
  --ink:#142019; --ink-soft:#4A5A52; --line:#DCE5DE;
  --paper:#F6F6F1; --white:#FFFFFF;
  --flag:#BE5A2E; --flag-bg:#FBEDE3;
  --gold:#A9802E; --gold-bg:#F6EFDD;
  --blue:#2E6E84; --blue-bg:#E2EFF3;
  --shadow:0 1px 2px rgba(20,32,25,.06),0 8px 24px rgba(20,32,25,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1240px;margin:0 auto;padding:0 20px}

/* Header */
header{background:var(--green-900);color:#fff;position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(255,255,255,.08)}
.head-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 20px;max-width:1240px;margin:0 auto;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.logo-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--green-400),var(--green-600));display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:18px;color:#fff;flex-shrink:0}
.brand h1{font-family:'Space Grotesk';font-weight:600;font-size:1.05rem;letter-spacing:-.01em;line-height:1.1}
.brand .sub{font-size:.72rem;color:var(--green-200);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.track-toggle{display:flex;background:rgba(255,255,255,.08);border-radius:10px;padding:3px}
.track-toggle button{font-family:'Space Grotesk';font-weight:600;font-size:.82rem;color:rgba(255,255,255,.65);background:none;border:0;padding:7px 16px;border-radius:7px;cursor:pointer;transition:.18s}
.track-toggle button.on{background:#fff;color:var(--green-900)}

/* Layout */
.layout{display:grid;grid-template-columns:236px 1fr;gap:28px;padding:28px 0 64px}
nav.levels{position:sticky;top:84px;align-self:start;display:flex;flex-direction:column;gap:6px}
.nav-label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin:4px 8px 8px}
.lvl{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;cursor:pointer;border:1px solid transparent;transition:.16s;text-align:left;background:none;width:100%}
.lvl:hover{background:var(--white);border-color:var(--line)}
.lvl.on{background:var(--green-700);border-color:var(--green-700)}
.lvl.on .lvl-name{color:#fff}.lvl.on .lvl-num{background:#fff;color:var(--green-700)}.lvl.on .lvl-meta{color:var(--green-200)}
.lvl-num{width:26px;height:26px;border-radius:7px;background:var(--green-50);color:var(--green-700);font-family:'Space Grotesk';font-weight:700;font-size:.82rem;display:grid;place-items:center;flex-shrink:0}
.lvl-name{font-family:'Space Grotesk';font-weight:600;font-size:.92rem;line-height:1.1}
.lvl-meta{font-size:.7rem;color:var(--ink-soft)}

/* Main */
main{min-width:0}
.role-head{background:var(--white);border:1px solid var(--line);border-radius:18px;padding:22px 24px;box-shadow:var(--shadow);margin-bottom:22px}
.role-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
.eyebrow{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--green-600);font-weight:600}
.role-title{font-family:'Space Grotesk';font-weight:700;font-size:1.7rem;letter-spacing:-.02em;margin-top:2px}
.role-title span{color:var(--green-400)}
.kcount{font-size:.82rem;color:var(--ink-soft);margin-top:4px}

/* Weight health */
.health{min-width:230px;background:var(--green-50);border:1px solid var(--green-200);border-radius:13px;padding:13px 15px}
.health.flag{background:var(--flag-bg);border-color:#EBC4A8}
.health-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.health-k{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.health-v{font-family:'Space Grotesk';font-weight:700;font-size:1.5rem}
.health.ok .health-v{color:var(--green-700)}.health.flag .health-v{color:var(--flag)}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:20px;margin-top:7px}
.badge.ok{background:var(--green-200);color:var(--green-900)}
.badge.flag{background:#EBC4A8;color:#7A3A18}

/* weight bar */
.wbar-wrap{margin-top:14px}
.wbar{position:relative;height:30px;border-radius:8px;background:#EDEDE6;overflow:hidden;display:flex}
.wseg{height:100%;border-right:1.5px solid #fff;transition:.2s;position:relative}
.wbar-100{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--ink);z-index:5}
.wbar-100::after{content:'100%';position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:.62rem;font-weight:700;color:var(--ink);font-family:'Space Grotesk';white-space:nowrap}
.wbar-legend{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:12px}
.leg{display:flex;align-items:center;gap:6px;font-size:.74rem;color:var(--ink-soft)}
.leg i{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.leg b{color:var(--ink);font-weight:600;font-family:'IBM Plex Mono';font-size:.72rem}

/* filters */
.filters{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{font-size:.8rem;font-weight:600;padding:7px 14px;border-radius:20px;border:1px solid var(--line);background:var(--white);color:var(--ink-soft);cursor:pointer;transition:.15s;font-family:'Inter'}
.chip:hover{border-color:var(--green-400)}
.chip.on{background:var(--green-700);border-color:var(--green-700);color:#fff}
.search{margin-left:auto;position:relative}
.search input{font-family:'Inter';font-size:.85rem;padding:9px 14px 9px 34px;border:1px solid var(--line);border-radius:20px;background:var(--white);width:200px;color:var(--ink)}
.search input:focus{outline:none;border-color:var(--green-400)}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.45}

/* group */
.group{margin-bottom:26px}
.group-head{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.group-dot{width:11px;height:11px;border-radius:50%}
.group-title{font-family:'Space Grotesk';font-weight:600;font-size:1.05rem}
.group-count{font-size:.74rem;color:var(--ink-soft);background:var(--white);border:1px solid var(--line);padding:2px 9px;border-radius:12px}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.card{background:var(--white);border:1px solid var(--line);border-radius:15px;padding:17px 18px;box-shadow:var(--shadow);display:flex;flex-direction:column;border-left-width:3px}
.card .cat{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.card .metric{font-family:'Space Grotesk';font-weight:600;font-size:1.08rem;line-height:1.2;margin:3px 0 9px}
.card .desc{font-size:.84rem;color:var(--ink-soft);margin-bottom:11px}
.formula{font-family:'IBM Plex Mono';font-size:.76rem;background:var(--green-50);border:1px solid var(--green-200);border-radius:8px;padding:9px 11px;color:var(--green-900);margin-bottom:12px;line-height:1.45;word-break:break-word}
.stats{display:flex;gap:8px;margin-bottom:11px}
.stat{flex:1;background:var(--paper);border-radius:8px;padding:7px 9px;text-align:center}
.stat .sk{font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.stat .sv{font-family:'Space Grotesk';font-weight:700;font-size:1.02rem;margin-top:1px}
.rules{font-size:.77rem;color:var(--ink-soft);border-top:1px dashed var(--line);padding-top:10px;margin-top:auto}
.rules b{color:var(--ink);font-weight:600}
.note{display:inline-flex;gap:6px;align-items:flex-start;background:var(--gold-bg);border:1px solid #E6D6AC;border-radius:8px;padding:7px 10px;font-size:.74rem;color:#6B5418;margin-top:10px}
.note svg{flex-shrink:0;margin-top:1px}
.missing{color:var(--flag);font-weight:600}

footer{border-top:1px solid var(--line);padding:22px 0;text-align:center;font-size:.76rem;color:var(--ink-soft)}

@media(max-width:860px){
  .layout{grid-template-columns:1fr;gap:18px;padding:18px 0 48px}
  nav.levels{position:static;flex-direction:row;overflow-x:auto;gap:8px;padding-bottom:6px;-webkit-overflow-scrolling:touch}
  .nav-label{display:none}
  .lvl{flex-shrink:0;width:auto;flex-direction:column;gap:4px;padding:9px 13px;align-items:flex-start}
  .lvl-meta{display:none}
  .role-title{font-size:1.35rem}
  .search{margin-left:0;width:100%}.search input{width:100%}
  .cards{grid-template-columns:1fr}
}
</style>
</head>

er customers across the division", "formula": "(Strategic Account Revenue ÷ Strategic Account Target) × 100", "weight": 0.25, "cap": "200%", "min": "—", "rules": "Strategic accounts defined as top-tier by revenue, brand penetration, and growth trajectory", "comment": ""}, {"title": "7.BS Principal", "category": "Market Development", "metric": "New Market or Segment Activation", "type": "Aspirational", "desc": "Identify and activate new customer segments, geographies, or untapped verticals within the division", "formula": "(Activated New Segments ÷ Target New Segments) × 100", "weight": 0.2, "cap": "180%", "min": "—", "rules": "Segment only counts if minimum revenue threshold achieved within the month of activation", "comment": ""}, {"title": "7.BS Principal", "category": "Strategic Growth", "metric": "Divisional Non-Food Penetration", "type": "Exceptional", "desc": "Division-wide non-food sales target achievement across all territories", "formula": "(Actual Divisional Non-Food Sales ÷ Divisional Non-Food Target) × 100", "weight": "Bonus", "cap": "300%", "min": "—", "rules": "Foundational KPI average must be 85%+ to activate. Measured at division level", "comment": ""}, {"title": "7.BS Principal", "category": "Strategic Growth", "metric": "Strategic Non-Food Growth Value", "type": "Exceptional", "desc": "Division-wide growth in non-food purchases above historical division baseline", "formula": "((Current Divisional Non-Food Sales − Avg Last 3 Months) ÷ Target Growth) × 100", "weight": "Bonus", "cap": "300%", "min": "—", "rules": "Calculated using rolling 3-month average at division level", "comment": ""}, {"title": "7.BS Principal", "category": "Customer Sustainability", "metric": "Sustained Revenue Rate", "type": "Aspirational", "desc": "Sustained revenue vs the baseline", "formula": "(This month's revenue ÷ Baseline revenue) × 100", "weight": 0.15, "cap": "150%", "min": "—", "rules": "", "comment": ""}];

const TYPE_META = {
  'Foundational':{dot:'var(--green-600)',bd:'var(--green-600)',bg:'var(--green-50)'},
  'Aspirational':{dot:'var(--blue)',bd:'var(--blue)',bg:'var(--blue-bg)'},
  'Exceptional':{dot:'var(--gold)',bd:'var(--gold)',bg:'var(--gold-bg)'}
};
const TYPE_ORDER = ['Foundational','Aspirational','Exceptional'];

// segment palette for weight bar
const SEG_COLORS = ['#286B4D','#4E9472','#2E6E84','#5FA0B0','#A9802E','#C99B4A','#1F4D38','#7FB295','#3E7C5E','#86A6B8','#BE5A2E','#D89A6A'];

function parseTitle(t){
  const dot=t.indexOf('.');
  const num=t.slice(0,dot);
  const rest=t.slice(dot+1).trim();
  const sp=rest.indexOf(' ');
  return {num, track:rest.slice(0,sp), name:rest.slice(sp+1)};
}
const LEVELS=[];
DATA.forEach(r=>{const p=parseTitle(r.title);if(!LEVELS.find(l=>l.num===p.num))LEVELS.push({num:p.num,name:p.name});});
LEVELS.sort((a,b)=>a.num-b.num);

let state={track:'BD',level:LEVELS[0].num,type:'all',q:''};

function isNum(w){return typeof w==='number';}
function isBonus(w){return typeof w==='string' && w.toLowerCase().includes('bonus');}

function roleRecords(){
  const title=`${state.level}.${state.track} ${LEVELS.find(l=>l.num===state.level).name}`;
  return DATA.filter(r=>r.title===title);
}

function renderNav(){
  const nav=document.getElementById('levelNav');
  nav.innerHTML='<div class="nav-label">Career Levels</div>'+LEVELS.map(l=>`
    <button class="lvl ${l.num===state.level?'on':''}" onclick="setLevel('${l.num}')">
      <span class="lvl-num">${l.num}</span>
      <span><span class="lvl-name">${l.name}</span><br><span class="lvl-meta">${state.track} ${l.name}</span></span>
    </button>`).join('');
}

function renderMain(){
  const recs=roleRecords();
  const lvl=LEVELS.find(l=>l.num===state.level);
  // weight health
  let coreSum=0,bonusN=0,blankN=0;
  recs.forEach(r=>{if(isNum(r.weight))coreSum+=r.weight;else if(isBonus(r.weight))bonusN++;else blankN++;});
  const pct=Math.round(coreSum*1000)/10;
  const ok=Math.abs(coreSum-1)<0.001;
  const delta=Math.round((coreSum-1)*1000)/10;

  // weight bar segments (core only)
  const core=recs.filter(r=>isNum(r.weight));
  const scale=Math.max(coreSum,1);
  let ci=0;
  const segs=core.map(r=>{const c=SEG_COLORS[ci++%SEG_COLORS.length];return {m:r.metric,w:r.weight,c};});
  const segHTML=segs.map(s=>`<div class="wseg" style="width:${(s.w/scale)*100}%;background:${s.c}" title="${s.m}: ${Math.round(s.w*100)}%"></div>`).join('');
  const linePos=(1/scale)*100;
  const legHTML=segs.map(s=>`<span class="leg"><i style="background:${s.c}"></i>${s.m} <b>${Math.round(s.w*100)}%</b></span>`).join('');

  let html=`
  <div class="role-head">
    <div class="role-top">
      <div>
        <div class="eyebrow">Level ${lvl.num} · ${state.track} Track</div>
        <div class="role-title">${lvl.name} <span>/ ${state.track}</span></div>
        <div class="kcount">${recs.length} KPIs${blankN?` · ${blankN} pending setup`:''}${bonusN?` · ${bonusN} bonus (outside core)`:''}</div>
      </div>
      <div class="health ${ok?'ok':'flag'}">
        <div class="health-row"><span class="health-k">Core Weight</span><span class="health-v">${pct}%</span></div>
        <span class="badge ${ok?'ok':'flag'}">${ok?'✓ Sums to 100%':`▲ ${delta>0?'+':''}${delta}% vs 100%`}</span>
      </div>
    </div>
    <div class="wbar-wrap">
      <div class="wbar">${segHTML}<div class="wbar-100" style="left:${linePos}%"></div></div>
      <div class="wbar-legend">${legHTML}</div>
    </div>
  </div>`;

  // filters
  html+=`<div class="filters">
    <div class="chips">
      <button class="chip ${state.type==='all'?'on':''}" onclick="setType('all')">All types</button>
      ${TYPE_ORDER.map(t=>`<button class="chip ${state.type===t?'on':''}" onclick="setType('${t}')">${t}</button>`).join('')}
    </div>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" placeholder="Search KPIs…" value="${state.q}" oninput="setQ(this.value)">
    </div>
  </div>`;

  // groups
  const q=state.q.toLowerCase();
  let any=false;
  TYPE_ORDER.forEach(type=>{
    if(state.type!=='all'&&state.type!==type)return;
    let items=recs.filter(r=>r.type===type);
    if(q)items=items.filter(r=>(r.metric+r.category+r.desc).toLowerCase().includes(q));
    if(!items.length)return;
    any=true;
    const tm=TYPE_META[type];
    html+=`<div class="group">
      <div class="group-head"><span class="group-dot" style="background:${tm.dot}"></span>
      <span class="group-title">${type}</span><span class="group-count">${items.length}</span></div>
      <div class="cards">${items.map(r=>card(r,tm)).join('')}</div></div>`;
  });
  if(!any)html+=`<p style="color:var(--ink-soft);padding:30px 0;text-align:center">No KPIs match this filter.</p>`;

  document.getElementById('main').innerHTML=html;
}

function wfmt(w){
  if(typeof w==='number')return Math.round(w*100)+'%';
  if(w==='')return '<span class="missing">—</span>';
  return w;
}
function vfmt(v){return v===''?'<span class="missing">—</span>':v;}

function card(r,tm){
  const noteHTML=r.comment?`<div class="note">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 19h20L12 2z"/><path d="M12 9v5M12 17h.01"/></svg>
    <span>${r.comment}</span></div>`:'';
  const formulaHTML=r.formula?`<div class="formula">${r.formula}</div>`:'';
  const rulesHTML=r.rules?`<div class="rules"><b>Rule:</b> ${r.rules}</div>`:'';
  return `<div class="card" style="border-left-color:${tm.bd}">
    <span class="cat">${r.category||'—'}</span>
    <div class="metric">${r.metric}</div>
    <div class="desc">${r.desc||''}</div>
    ${formulaHTML}
    <div class="stats">
      <div class="stat"><div class="sk">Weight</div><div class="sv">${wfmt(r.weight)}</div></div>
      <div class="stat"><div class="sk">Cap</div><div class="sv">${vfmt(r.cap)}</div></div>
      <div class="stat"><div class="sk">Min</div><div class="sv">${vfmt(r.min)}</div></div>
    </div>
    ${rulesHTML}
    ${noteHTML}
  </div>`;
}

function setLevel(n){state.level=parseInt(n);renderNav();renderMain();}
function setType(t){state.type=t;renderMain();}
function setQ(v){state.q=v;renderMain();}
document.getElementById('trackToggle').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  state.track=b.dataset.track;
  [...document.querySelectorAll('#trackToggle button')].forEach(x=>x.classList.toggle('on',x===b));
  renderNav();renderMain();
});

renderNav();renderMain();
</script>
